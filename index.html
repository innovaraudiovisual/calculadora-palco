<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovar - Palco e LED</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --led-color: #9b59b6; 
            --piece2x1: #e67e22; 
            --piece1x1: #27ae60; 
            --dark: #34495e; 
            --cable-link: #2ecc71; 
            --cable-ac: #e74c3c; 
            --case-color: #f39c12;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; box-sizing: border-box; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; border-radius: 8px 8px 0 0; }
        .tab-btn.active { background: var(--accent); color: white; }

        .logo-container { text-align: center; margin-bottom: 15px; }
        
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 11px; color: #666; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        
        .btn-calc { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-pdf { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        
        .btn-open-modal { width: 100%; padding: 14px; background: #fff; color: var(--accent); border: 2px solid var(--accent); border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-open-modal:hover { background: var(--accent); color: white; }

        #resultado { margin-top: 25px; width: 100%; }
        .resumo-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .resumo-item { background: #fff; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; }
        .resumo-item small { display: block; font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .resumo-item span { display: block; font-size: 15px; font-weight: bold; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .modal-content { background: #222; max-width: 98%; width: fit-content; max-height: 90vh; border-radius: 12px; position: relative; padding: 40px; overflow: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .btn-close-modal { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 1001; }
        
        .drawing-wrapper { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto 1fr; gap: 10px; align-items: center; justify-items: center; position: relative; }
        .measure-top { grid-column: 2; text-align: center; color: #3498db; font-weight: bold; font-size: 14px; border-bottom: 2px solid #3498db; width: 100%; padding-bottom: 4px; }
        .measure-left { grid-row: 2; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); color: #3498db; font-weight: bold; font-size: 14px; border-left: 2px solid #3498db; height: 100%; padding-left: 4px; display: flex; align-items: center; justify-content: center; }
        
        #croqui-container { grid-column: 2; grid-row: 2; position: relative; display: inline-block; }
        #croqui { display: grid; gap: 2px; }
        .peca { display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 8px; border-radius: 2px; min-width: 22px; min-height: 22px; }
        
        /* RESOLUÇÃO NO CENTRO */
        .centro-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.7); color: #fff; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; text-align: center; border: 1px solid #3498db; pointer-events: none; z-index: 5; white-space: nowrap; }

        .p2x1 { background-color: var(--piece2x1); }
        .p1x1 { background-color: var(--piece1x1); }
        .pled-g { background-color: var(--led-color); border: 1px solid rgba(255,255,255,0.2); }
        .pled-p { background-color: #8e44ad; border: 1px solid rgba(255,255,255,0.2); }

        .creditos-pwa { text-align: center; margin-top: 15px; font-size: 9px; color: #bbb; text-transform: uppercase; }

        @media print {
            .tabs, .btn-calc, .btn-pdf, .btn-open-modal, .input-row, .logo-container, .btn-close-modal { display: none !important; }
            .modal-overlay { position: relative; display: block !important; background: white; padding: 0; }
            .modal-content { background: white; max-width: 100%; width: 100%; box-shadow: none; padding: 0; }
            .measure-top, .measure-left { color: black; border-color: black; }
            .centro-info { color: black; background: white; border: 1px solid black; }
            .peca { color: black !important; border: 1px solid #000 !important; background: none !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container"><h2 style="color: var(--primary); margin:0;">INNOVAR</h2><small>AUDIOVISUAL</small></div>
    
    <div class="tabs">
        <button id="btn-tab-palco" class="tab-btn active" onclick="switchTab('palco')">Palco</button>
        <button id="btn-tab-led" class="tab-btn" onclick="switchTab('led')">Painel LED</button>
    </div>

    <div id="form-palco">
        <div class="input-row">
            <div class="input-group"><label>Largura (m):</label><input type="number" id="L_palco" placeholder="0"></div>
            <div class="input-group"><label>Comprimento (m):</label><input type="number" id="C_palco" placeholder="0"></div>
        </div>
        <button class="btn-calc" onclick="calcularPalco()">Calcular Estrutura</button>
    </div>

    <div id="form-led" style="display:none;">
        <div class="input-row">
            <div class="input-group"><label>Largura (m):</label><input type="number" id="L_led" placeholder="0" step="0.5"></div>
            <div class="input-group"><label>Altura (m):</label><input type="number" id="H_led" placeholder="0" step="0.5"></div>
        </div>
        <button class="btn-calc" onclick="calcularLED()">Calcular Painel</button>
    </div>

    <div id="resultado" style="display:none;">
        <h3 id="print-header" style="text-align:center; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px;"></h3>
        <div id="resumo-content" class="resumo-box"></div>
        
        <button id="btn-view-led" class="btn-open-modal" onclick="openModal()">
            VISUALIZAR DESENHO
        </button>

        <button class="btn-pdf" onclick="window.print()">Gerar PDF / Imprimir</button>
        <div class="creditos-pwa">dev inovar audiovisual agnaldo</div>
    </div>
</div>

<div id="modal-croqui" class="modal-overlay" onclick="closeModalExterno(event)">
    <div class="modal-content">
        <button class="btn-close-modal" onclick="closeModal()">×</button>
        <div class="drawing-wrapper">
            <div id="m-top" class="measure-top">0m</div>
            <div id="m-left" class="measure-left">0m</div>
            <div id="croqui-container">
                <div id="info-centro" class="centro-info"></div>
                <div id="croqui"></div>
            </div>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.getElementById('form-palco').style.display = tab === 'palco' ? 'block' : 'none';
    document.getElementById('form-led').style.display = tab === 'led' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-tab-' + tab).classList.add('active');
    document.getElementById('resultado').style.display = 'none';
}

function openModal() { document.getElementById('modal-croqui').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-croqui').style.display = 'none'; }
function closeModalExterno(e) { if(e.target.id === 'modal-croqui') closeModal(); }

const formatBR = (val) => val.toLocaleString('pt-BR');

function calcularPalco() {
    const L = parseInt(document.getElementById('L_palco').value);
    const C = parseInt(document.getElementById('C_palco').value);
    if(!L || !C) return;
    
    document.getElementById('m-top').innerText = L + "m";
    document.getElementById('m-left').innerText = C + "m";
    document.getElementById('info-centro').innerText = `${L} x ${C} m`;
    
    const resumo = document.getElementById('resumo-content');
    const croqui = document.getElementById('croqui');
    croqui.innerHTML = '';
    
    let n2x1 = 0, n1x1 = 0;
    let ocupado = Array(C).fill().map(() => Array(L).fill(false));
    let size = L > 15 ? 18 : 30;

    croqui.style.gridTemplateColumns = `repeat(${L}, ${size}px)`;
    for (let i = 0; i < C; i++) {
        for (let j = 0; j < L; j++) {
            if (ocupado[i][j]) continue;
            let div = document.createElement('div');
            div.className = 'peca';
            if (j + 1 < L && !ocupado[i][j+1]) {
                ocupado[i][j] = ocupado[i][j+1] = true;
                div.classList.add('p2x1'); div.style.gridColumn = 'span 2'; div.innerText = '2x1'; n2x1++;
            } else {
                ocupado[i][j] = true;
                div.classList.add('p1x1'); div.innerText = '1x1'; n1x1++;
            }
            div.style.height = `${size}px`;
            croqui.appendChild(div);
        }
    }
    resumo.innerHTML = `
        <div class="resumo-item"><small>Peças 2x1m</small><span>${n2x1}</span></div>
        <div class="resumo-item"><small>Peças 1x1m</small><span>${n1x1}</span></div>
        <div class="resumo-item"><small>Pés Totais</small><span>${(n2x1 + n1x1) * 4}</span></div>
        <div class="resumo-item"><small>Área Total</small><span>${formatBR(L * C)} m²</span></div>
    `;
    document.getElementById('print-header').innerText = `PALCO: ${L}m x ${C}m`;
    document.getElementById('resultado').style.display = 'block';
}

function calcularLED() {
    const L = parseFloat(document.getElementById('L_led').value);
    const H = parseFloat(document.getElementById('H_led').value);
    if(!L || !H) return;

    const cols05 = Math.round(L / 0.5);
    const rows05 = Math.round(H / 0.5);
    const resTotal = `${cols05 * 128} x ${rows05 * 128} px`;

    document.getElementById('m-top').innerText = formatBR(L) + "m";
    document.getElementById('m-left').innerText = formatBR(H) + "m";
    document.getElementById('info-centro').innerText = resTotal;

    const resumo = document.getElementById('resumo-content');
    const croqui = document.getElementById('croqui');
    croqui.innerHTML = '';

    const area = L * H;
    const qtdCabos = Math.max(2, Math.ceil((area / 9) * 15));

    let pxSize = cols05 > 30 ? 15 : 24;
    croqui.style.gridTemplateColumns = `repeat(${cols05}, ${pxSize}px)`;
    let p10 = 0, p05 = 0;

    for (let r = 0; r < rows05; r++) {
        for (let c = 0; c < cols05; c++) {
            let div = document.createElement('div');
            div.className = 'peca';
            if (c + 1 < cols05) {
                div.classList.add('pled-g'); div.style.gridColumn = 'span 2'; div.innerText = '1m';
                p10++; c++;
            } else {
                div.classList.add('pled-p'); div.innerText = '.5'; p05++;
            }
            div.style.height = `${pxSize}px`;
            croqui.appendChild(div);
        }
    }

    const capG = 6, capP = 8;
    const casesG = Math.ceil(p10 / capG), casesP = Math.ceil(p05 / capP);
    const sobraG = (casesG * capG) - p10, sobraP = (casesP * capP) - p05;

    resumo.innerHTML = `
        <div class="resumo-item highlight-res"><small>Resolução</small><span>${resTotal}</span></div>
        <div class="resumo-item highlight-cabo-link"><small>Cabos Link</small><span>${qtdCabos} un</span></div>
        <div class="resumo-item highlight-cabo-ac"><small>Cabos AC</small><span>${qtdCabos} un</span></div>
        <div class="resumo-item"><small>Placas 1m</small><span>${p10}</span></div>
        <div class="resumo-item"><small>Placas 0.5m</small><span>${p05}</span></div>
        <div class="resumo-item highlight-case"><small>Total de Cases</small><span>${casesG + casesP}</span></div>
        <div class="resumo-item highlight-empty"><small>Backup 1m</small><span>${sobraG} un</span></div>
        <div class="resumo-item highlight-empty"><small>Backup 0.5m</small><span>${sobraP} un</span></div>
        <div class="resumo-item"><small>Área Total</small><span>${formatBR(area)} m²</span></div>
    `;

    document.getElementById('print-header').innerText = `PAINEL LED: ${formatBR(L)}m x ${formatBR(H)}m`;
    document.getElementById('resultado').style.display = 'block';
}
</script>
</body>
</html>
